databases:
  - name: formbricks-db
    databaseName: formbricks
    user: formbricks

services:
  - type: web
    name: formbricks
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: formbricks-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://formbricks.example.com
